<div class="bg-black h-full w-full md:w-60 p-6 overflow-auto shadow-2xl flex flex-col gap-3">
            <a routerLink="/" class="self-center">
              <svg width="120" height="50" viewBox="0 0 120 50" xmlns="http://www.w3.org/2000/svg">
                <text
                  x="50%"
                  y="50%"
                  font-family="Georgia, 'Times New Roman', serif"
                  font-size="32"
                  font-style="italic"
                  font-weight="bold"
                  fill="white"
                  text-anchor="middle"
                  dominant-baseline="central">
                  H&amp;H
                </text>
              </svg>
            </a>

            <hr class="border-white mb-5">

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/admin/add"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Add Product
            </h1>

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/admin/update"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Update Product
            </h1>

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/admin/delete"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Delete Product
            </h1>

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/admin/Users"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Users
            </h1>
    </div>
