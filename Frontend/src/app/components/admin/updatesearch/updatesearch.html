<div class="flex flex-col md:flex-row min-h-screen gap-4">
    <div class="bg-black w-full md:w-60 p-6 overflow-auto shadow-2xl flex flex-col gap-3">
            <img src="/assets/LoginPage.png" alt="Login Page" class="w-32 mb-5 rounded-md">
            <hr class="border-white mb-5">

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/add"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Add Product
            </h1>

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/update"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Update Product
            </h1>

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/delete"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Delete Product
            </h1>

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/Users"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Users
            </h1>
    </div>

    <div class="flex flex-col justify-center items-center mt-8 gap-8 w-full">
            <div class="relative border w-3/5   border-gray-300 rounded-md">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 hover:cursor-pointer hover:text-[#D93B3B]"></i>
            <input
                type="text"
                placeholder="Search products..."
                class="w-full rounded-md pl-10 pr-4 py-2 text-sm text-white outline-none focus:ring-2 focus:text-black "
            />
            </div>
        <div>
            <app-vertical-card-slider></app-vertical-card-slider>
        </div>
    </div>
</div>
