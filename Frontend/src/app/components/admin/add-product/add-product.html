<div class="flex flex-col md:flex-row min-h-screen gap-4">

    <div class="bg-black w-full md:w-60 p-6 overflow-auto shadow-2xl flex flex-col gap-3">
            <img src="/assets/LoginPage.png" alt="Login Page" class="w-32 mb-5 rounded-md">
            <hr class="border-white mb-5">

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/add"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Add Product
            </h1>

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/update"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Update Product
            </h1>

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/delete-product"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Delete Product
            </h1>

            <h1
            class="text-white mb-2 cursor-pointer rounded"
            routerLink="/Users"
            routerLinkActive="bg-gray-600 py-1 px-1"
            [routerLinkActiveOptions]="{ exact: true }"
            >
            Users
            </h1>
    </div>

    <div class="flex-1 flex items-center justify-center my-14"> <!--flex-1 is Tailwind shorthand for flex-grow: 1; flex-shrink: 1; flex-basis: 0;-->
        <div class="bg-white w-full md:w-3/5 rounded-2xl p-6 shadow-2xl overflow-auto">
        <h1 class="font-bold text-4xl mb-6 text-center">Add Products</h1>

        <label class="block mb-2">Product Name</label>
        <input type="text" placeholder="Enter product name" class="w-full border-2 rounded-md px-4 py-2 text-sm text-black focus:outline-none focus:border-[#D93B3B]">

        <label class="block mb-2 mt-4">Product Price</label>
        <input type="text" placeholder="Enter product price" class="w-full border-2 rounded-md px-4 py-2 text-sm text-black focus:outline-none focus:border-[#D93B3B]">

        <label class="block mb-2 mt-4">Quantity</label>
        <input type="text" placeholder="Enter quantity" class="w-full border-2 rounded-md px-4 py-2 text-sm text-black focus:outline-none focus:border-[#D93B3B]">

        <label class="block mb-2 mt-4">Product Description</label>
        <input type="text" placeholder="Enter product description" class="w-full border-2 rounded-md px-4 py-2 text-sm text-black focus:outline-none focus:border-[#D93B3B]">

        <label class="block mb-2 mt-4">Image URL</label>
        <input type="text" placeholder="Enter product image" class="w-full border-2 rounded-md px-4 py-2 text-sm text-black focus:outline-none focus:border-[#D93B3B]">

        <label class="block mb-2 mt-4">Category</label>
        <select class="w-full border-2 rounded-md px-4 py-2 text-sm text-black focus:outline-none focus:border-[#D93B3B]">
        <option value="" disabled selected>Select a category</option>
        <option value="electronics">Electronics</option>
        <option value="fashion">Fashion</option>
        <option value="books">Books</option>
        <option value="home">Home</option>
        <option value="toys">Toys</option>
        </select>
        <button type="submit" class="w-full bg-[#D93B3B] hover:bg-[#b22b2b] py-2 rounded-md mt-6 text-white font-semibold transition transform hover:scale-105">
            ADD
        </button>
        </div>
    </div>
</div>
