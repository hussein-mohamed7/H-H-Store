<nav class="bg-black text-white px-4 md:px-6 py-6">
  <div class="flex items-center justify-between">

          <!-- Logo -->
          <a routerLink="/"><img src="assets/logo.png" class="h-10 w-auto"alt="Logo"/></a>

          <!-- Search -->
          <div class="hidden md:block w-1/3">
            <div class="relative border border-gray-300 rounded-md">
              <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 hover:cursor-pointer hover:text-[#D93B3B]"></i>
              <input
                type="text"
                placeholder="Search products..."
                class="w-full rounded-md pl-10 pr-4 py-2 text-sm text-white outline-none focus:ring-2 focus:text-white "
              />
            </div>
          </div>

          <!-- Right Side -->
          <div class="flex items-center gap-6">

            <!-- Categories -->
            <div class="relative hidden md:block">
              <button
                (click)="toggleDropdown()"
                class="px-4 py-2 rounded-md text-sm hover:bg-gray-700 flex items-center gap-2"
              >
                Categories
                <i class="fa-solid fa-angle-down"></i>
              </button>

              @if (isOpen) {
                <div class="absolute right-0 mt-2 w-40 bg-white text-black rounded-md shadow-lg z-50">
                  <a class="block px-4 py-2 hover:bg-gray-100 cursor-pointer">Electronics</a>
                  <a class="block px-4 py-2 hover:bg-gray-100 cursor-pointer">Clothes</a>
                  <a class="block px-4 py-2 hover:bg-gray-100 cursor-pointer">Food</a>
                </div>
              }
            </div>

            <!-- Cart -->
            <div class="relative cursor-pointer hidden md:block">
              <span class="text-2xl">🛒</span>
            </div>

            <!-- User -->
<a routerLink="/login">
  <img
    src="https://i.pravatar.cc/40"
    class="h-9 w-9 rounded-full cursor-pointer border-2 border-white hidden md:block"
    alt="User"
  />
</a>

            <!-- Hamburger -->
            <button
              class="md:hidden text-2xl"
              (click)="toggleMenu()"
            >
              ☰
            </button>

          </div>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen) {
    <div class="md:hidden mt-4 space-y-4">

      <div class="relative border border-gray-300 rounded-md">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 hover:cursor-pointer hover:text-[#D93B3B]"></i>
        <input
          type="text"
          placeholder="Search products..."
          class="w-full rounded-md pl-10 pr-4 py-2 text-sm text-white outline-none focus:ring-2 focus:text-white "
        />
      </div>

      <button
        (click)="toggleDropdown()"
        class="w-full px-4 py-2 rounded-md text-sm bg-gray-800 flex items-center justify-between"
      >
        Categories
        <i class="fa-solid fa-angle-down"></i>
      </button>

      @if (isOpen) {
        <div class="bg-white text-black rounded-md shadow-lg">
          <a class="block px-4 py-2 hover:bg-gray-100 cursor-pointer">Electronics</a>
          <a class="block px-4 py-2 hover:bg-gray-100 cursor-pointer">Clothes</a>
          <a class="block px-4 py-2 hover:bg-gray-100 cursor-pointer">Food</a>
        </div>
      }

      <div class="flex items-center justify-between">
        <div class="relative cursor-pointer">
          <span class="text-2xl">🛒</span>
          <span class="absolute -top-2 -right-3 bg-red-500 text-xs px-2 py-0.5 rounded-full">
            2
          </span>
        </div>

        <img
          src="https://i.pravatar.cc/40"
          class="h-9 w-9 rounded-full cursor-pointer border-2 border-white"
          alt="User"
        />
      </div>

    </div>
  }
