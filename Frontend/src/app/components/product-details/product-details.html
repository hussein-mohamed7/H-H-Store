<div class="flex justify-center items-center  ">
    <div class="flex flex-col md:flex-row bg-[#F5ECE6] gap-6 md:my-8 md:h-150 rounded-2xl  shadow-2xl shadow-[#D93B3B] ">
        <div class="flex flex-col ">
            <img [src]="product?.imageURL" alt="Product Image" class="w-64 h-64 my-12 ml-40 object-cover">
            <div class="flex flex-col gap-4 px-8 pt-2">
            <h1 class="text-3xl">{{product.name}}</h1>
            <h1 class="text-xl">Price : {{product.price}} EGP</h1>
            <h1 class="text-xl">{{product.description}}</h1>
            </div>
        </div>

        <div class=" flex flex-col gap-6 md:p-20 md:mr-12 md:mt-16 m-8">
            <button class="w-[150px] h-[35px]  bg-[#D93B3B] rounded-md  text-white text-xl hover:scale-105 hover:cursor-pointer ">Buy</button>
            <button class="w-[150px] h-[35px]  bg-[#D93B3B] rounded-md  text-white text-xl hover:scale-105 hover:cursor-pointer " (click)="ADD()">Add To Cart</button>
        </div>
    </div>
</div>
