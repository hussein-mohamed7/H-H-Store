<div class="container">

  @if(!isLoading && productCount == 0)
  {
    <h1 class="mt-3 self-center">No products found.</h1>
  }
  @else
  {
    <div class="cards-container">
    @for(product of products(); track product._id) {
      @defer (on viewport) {
        <app-card [cardImg]="product.imageURL" [cardText]="product.name" [cardPrice]="product.price" routeLink="{{cardRouteBaseLink}}/{{product._id}}"></app-card>
      } @placeholder {
        <div class="h-[340px] w-full bg-gray-200 animate-pulse rounded-xl"></div>
      }
    }
    </div>
  }

@if(!isLoading && page*6 < productCount)
{
  <button class="w-full bg-[#D93B3B] hover:bg-[#D93B3B] py-2 rounded-md mt-2 text-white hover:scale-105 hover:cursor-pointer " (click)="loadProducts()">Show More</button>
}
@if(isLoading)
{
  <h1 class="mt-3">Loading</h1>
}
</div>
